<mat-card-header>
    <mat-card-title-group>
      <mat-card-title>
        Add Certificate
      </mat-card-title>
      <mat-card-subtitle>The certificate will be added to AMT</mat-card-subtitle>
    </mat-card-title-group>
  </mat-card-header>
  <mat-dialog-content>
    <div class="flex-row flex-wrap flex-1" style="margin:16px 0">
      <div class="flex flex-50" style="margin-top:12px">
        <button type="button" color="primary" mat-raised-button (click)="fileInput.click()">Choose File</button>
        <input hidden (change)="onFileSelected($event)" #fileInput type="file" id="file" accept=".cer">
      </div>
    </div>
    <mat-checkbox class="example-margin" [(ngModel)]="certInfo.isTrustedRoot">Trusted Root</mat-checkbox>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
      <button mat-button [mat-dialog-close]="''" (click)="onCancel()">Cancel</button>
      <button mat-button [mat-dialog-close]="certInfo" color="primary">OK</button>
  </mat-dialog-actions>
