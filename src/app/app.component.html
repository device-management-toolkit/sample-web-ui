<mat-sidenav-container autosize #sidenavContainer [dir]="direction">
  @if (isLoggedIn) {
    <mat-sidenav mode="side" opened class="dark-theme">
      <app-navbar></app-navbar>
    </mat-sidenav>
  }

  <mat-sidenav-content>
    <app-toolbar [sidenavContainer]="sidenavContainer"></app-toolbar>

    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
